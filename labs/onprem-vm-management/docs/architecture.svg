<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="Segoe UI, -apple-system, sans-serif">
  <defs>
    <filter id="s" x="-2%" y="-4%" width="104%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#0078d4"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#008272"/></marker>
    <marker id="ao" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#d83b01"/></marker>
    <marker id="ab-rev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><path d="M8,0 L0,3 L8,6" fill="#0078d4"/></marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="720" rx="8" fill="#f8f9fa"/>
  <text x="480" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#323130">On-Premise VM Management Lab — Architecture</text>

  <!-- ════════ TOP SECTION: On-Premise Servers ════════ -->
  <rect x="30" y="42" width="900" height="100" rx="8" fill="none" stroke="#5c2d91" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="50" y="58" font-size="10" font-weight="600" fill="#5c2d91">ON-PREMISE / ARCBOX</text>

  <!-- Server 1 -->
  <rect x="50" y="68" width="152" height="58" rx="6" fill="#fff" filter="url(#s)"/>
  <rect x="50" y="68" width="152" height="4" rx="6" fill="#5c2d91"/>
  <text x="126" y="92" text-anchor="middle" font-size="11" font-weight="600" fill="#323130">ArcBox-Win2K22</text>
  <text x="126" y="106" text-anchor="middle" font-size="9" fill="#605e5c">🖥 Windows Server</text>

  <!-- Server 2 -->
  <rect x="218" y="68" width="152" height="58" rx="6" fill="#fff" filter="url(#s)"/>
  <rect x="218" y="68" width="152" height="4" rx="6" fill="#5c2d91"/>
  <text x="294" y="92" text-anchor="middle" font-size="11" font-weight="600" fill="#323130">ArcBox-Win2K25</text>
  <text x="294" y="106" text-anchor="middle" font-size="9" fill="#605e5c">🖥 Windows Server</text>

  <!-- Server 3 -->
  <rect x="386" y="68" width="152" height="58" rx="6" fill="#fff" filter="url(#s)"/>
  <rect x="386" y="68" width="152" height="4" rx="6" fill="#5c2d91"/>
  <text x="462" y="92" text-anchor="middle" font-size="11" font-weight="600" fill="#323130">ArcBox-SQL</text>
  <text x="462" y="106" text-anchor="middle" font-size="9" fill="#605e5c">🖥 Windows + SQL</text>

  <!-- Server 4 -->
  <rect x="554" y="68" width="152" height="58" rx="6" fill="#fff" filter="url(#s)"/>
  <rect x="554" y="68" width="152" height="4" rx="6" fill="#5c2d91"/>
  <text x="630" y="92" text-anchor="middle" font-size="11" font-weight="600" fill="#323130">ArcBox-Ubuntu-01</text>
  <text x="630" y="106" text-anchor="middle" font-size="9" fill="#605e5c">🐧 Ubuntu Linux</text>

  <!-- Server 5 -->
  <rect x="722" y="68" width="152" height="58" rx="6" fill="#fff" filter="url(#s)"/>
  <rect x="722" y="68" width="152" height="4" rx="6" fill="#5c2d91"/>
  <text x="798" y="92" text-anchor="middle" font-size="11" font-weight="600" fill="#323130">ArcBox-Ubuntu-02</text>
  <text x="798" y="106" text-anchor="middle" font-size="9" fill="#605e5c">🐧 Ubuntu Linux</text>

  <!-- ════════ ARROWS: Servers ↔ Azure ════════ -->
  <!-- Servers → Azure Monitor (green, metrics via AMA) -->
  <line x1="300" y1="142" x2="300" y2="178" stroke="#008272" stroke-width="1.5" marker-end="url(#ag)"/>
  <line x1="300" y1="178" x2="195" y2="178" stroke="#008272" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="310" y="170" font-size="8" fill="#008272">metrics via AMA</text>

  <!-- SRE Agent → Servers (blue, Arc Run Commands) — goes up on the right -->
  <line x1="700" y1="178" x2="700" y2="142" stroke="#0078d4" stroke-width="1.5" marker-end="url(#ab-rev)"/>
  <text x="710" y="166" font-size="8" fill="#0078d4">Arc Run Commands</text>

  <!-- Azure Arc bidirectional label -->
  <rect x="400" y="146" width="160" height="18" rx="9" fill="#e8e8e8"/>
  <text x="480" y="158" text-anchor="middle" font-size="9" font-weight="600" fill="#323130">⇅ Azure Arc Agent + AMA</text>

  <!-- ════════ MIDDLE SECTION: Azure Resource Group ════════ -->
  <rect x="30" y="172" width="900" height="310" rx="8" fill="none" stroke="#0078d4" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="50" y="188" font-size="10" font-weight="600" fill="#0078d4">AZURE RESOURCE GROUP</text>

  <!-- ──── Azure Monitor (left) ──── -->
  <rect x="50" y="198" width="220" height="140" rx="6" fill="#fff" filter="url(#s)"/>
  <rect x="50" y="198" width="220" height="4" rx="6" fill="#008272"/>
  <text x="160" y="220" text-anchor="middle" font-size="12" font-weight="600" fill="#008272">📊 Azure Monitor</text>
  <line x1="70" y1="228" x2="250" y2="228" stroke="#edebe9" stroke-width="1"/>
  <text x="70" y="244" font-size="9" fill="#323130">📁 Log Analytics Workspace</text>
  <text x="70" y="260" font-size="9" fill="#323130">💓 Heartbeat + CPU + Memory alerts</text>
  <text x="70" y="276" font-size="9" fill="#323130">📈 Perf table + Heartbeat table</text>
  <text x="70" y="292" font-size="9" fill="#323130">🔔 Action Groups → SRE Agent</text>

  <!-- ──── Azure SRE Agent (center, large) ──── -->
  <rect x="290" y="198" width="380" height="270" rx="6" fill="#fff" filter="url(#s)"/>
  <rect x="290" y="198" width="380" height="4" rx="6" fill="#0078d4"/>
  <text x="480" y="222" text-anchor="middle" font-size="13" font-weight="700" fill="#0078d4">🤖 Azure SRE Agent</text>
  <line x1="310" y1="230" x2="650" y2="230" stroke="#edebe9" stroke-width="1"/>

  <text x="310" y="250" font-size="10" fill="#323130">📚 Knowledge Base (3 runbooks)</text>
  <text x="320" y="265" font-size="8" fill="#605e5c">vm-health · security-baseline · patching-guide</text>

  <line x1="310" y1="275" x2="650" y2="275" stroke="#f3f2f1" stroke-width="0.5"/>
  <text x="310" y="291" font-size="10" fill="#107c10">🤖 vm-diagnostics subagent</text>
  <text x="310" y="307" font-size="10" fill="#107c10">🤖 security-troubleshooter subagent</text>

  <line x1="310" y1="317" x2="650" y2="317" stroke="#f3f2f1" stroke-width="0.5"/>
  <text x="310" y="333" font-size="10" fill="#d83b01">🛡️ arc-remediation-approval hook</text>

  <line x1="310" y1="343" x2="650" y2="343" stroke="#f3f2f1" stroke-width="0.5"/>
  <text x="310" y="359" font-size="10" fill="#323130">⏰ Health scan (6h) · Patch scan (weekly)</text>

  <line x1="310" y1="369" x2="650" y2="369" stroke="#f3f2f1" stroke-width="0.5"/>
  <text x="310" y="385" font-size="10" fill="#323130">🔧 Skills: health-check · security · patching</text>

  <line x1="310" y1="395" x2="650" y2="395" stroke="#f3f2f1" stroke-width="0.5"/>
  <text x="310" y="411" font-size="10" fill="#323130">🔐 Managed Identity + RBAC</text>

  <!-- Capability badges -->
  <rect x="310" y="422" width="70" height="18" rx="9" fill="#deecf9"/>
  <text x="345" y="434" text-anchor="middle" font-size="8" font-weight="600" fill="#0078d4">Arc</text>
  <rect x="388" y="422" width="70" height="18" rx="9" fill="#deecf9"/>
  <text x="423" y="434" text-anchor="middle" font-size="8" font-weight="600" fill="#0078d4">Monitor</text>
  <rect x="466" y="422" width="90" height="18" rx="9" fill="#deecf9"/>
  <text x="511" y="434" text-anchor="middle" font-size="8" font-weight="600" fill="#0078d4">Update Mgr</text>
  <rect x="564" y="422" width="70" height="18" rx="9" fill="#deecf9"/>
  <text x="599" y="434" text-anchor="middle" font-size="8" font-weight="600" fill="#0078d4">Identity</text>

  <!-- ──── Azure Update Manager (right) ──── -->
  <rect x="690" y="198" width="220" height="100" rx="6" fill="#fff" filter="url(#s)"/>
  <rect x="690" y="198" width="220" height="4" rx="6" fill="#d83b01"/>
  <text x="800" y="222" text-anchor="middle" font-size="12" font-weight="600" fill="#d83b01">🔄 Azure Update Manager</text>
  <line x1="710" y1="228" x2="890" y2="228" stroke="#edebe9" stroke-width="1"/>
  <text x="710" y="246" font-size="9" fill="#323130">📋 Patch assessment</text>
  <text x="710" y="262" font-size="9" fill="#323130">🚀 Patch deployment</text>
  <text x="710" y="278" font-size="9" fill="#323130">📅 Maintenance windows</text>

  <!-- ════════ ARROWS within Azure ════════ -->
  <!-- Azure Monitor → SRE Agent -->
  <line x1="270" y1="268" x2="290" y2="268" stroke="#0078d4" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="272" y="262" font-size="7" fill="#0078d4">alerts</text>

  <!-- SRE Agent → Azure Update Manager -->
  <line x1="670" y1="250" x2="690" y2="250" stroke="#0078d4" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="672" y="244" font-size="7" fill="#0078d4">patch orch.</text>

  <!-- Azure Update Manager → Servers (orange, going up) -->
  <line x1="850" y1="198" x2="850" y2="142" stroke="#d83b01" stroke-width="1.5" marker-end="url(#ao)"/>
  <text x="856" y="170" font-size="8" fill="#d83b01">patch deploy</text>

  <!-- ════════ BOTTOM SECTION: Lab Scenarios ════════ -->
  <text x="480" y="504" text-anchor="middle" font-size="13" font-weight="600" fill="#323130">Lab Scenarios</text>

  <!-- Scenario 1: Health Alert -->
  <rect x="50" y="516" width="270" height="80" rx="6" fill="#fff" filter="url(#s)"/>
  <rect x="50" y="516" width="270" height="4" rx="6" fill="#0078d4"/>
  <text x="185" y="538" text-anchor="middle" font-size="11" font-weight="600" fill="#0078d4">Scenario 1: Health Alert</text>
  <text x="70" y="556" font-size="9" fill="#605e5c">break-cpu.sh → alert fires → investigate</text>
  <text x="70" y="570" font-size="9" fill="#605e5c">→ diagnose root cause → auto-remediate</text>
  <rect x="70" y="578" width="48" height="12" rx="6" fill="#deecf9"/>
  <text x="94" y="587" text-anchor="middle" font-size="7" font-weight="600" fill="#0078d4">~10 min</text>

  <!-- Scenario 2: Security Agent -->
  <rect x="340" y="516" width="270" height="80" rx="6" fill="#fff" filter="url(#s)"/>
  <rect x="340" y="516" width="270" height="4" rx="6" fill="#008272"/>
  <text x="475" y="538" text-anchor="middle" font-size="11" font-weight="600" fill="#008272">Scenario 2: Security Agent</text>
  <text x="360" y="556" font-size="9" fill="#605e5c">break-defender.sh → detect drift</text>
  <text x="360" y="570" font-size="9" fill="#605e5c">→ diagnose config gap → fix + verify</text>
  <rect x="360" y="578" width="48" height="12" rx="6" fill="#dff6dd"/>
  <text x="384" y="587" text-anchor="middle" font-size="7" font-weight="600" fill="#008272">~10 min</text>

  <!-- Scenario 3: Patch Assessment -->
  <rect x="630" y="516" width="270" height="80" rx="6" fill="#fff" filter="url(#s)"/>
  <rect x="630" y="516" width="270" height="4" rx="6" fill="#d83b01"/>
  <text x="765" y="538" text-anchor="middle" font-size="11" font-weight="600" fill="#d83b01">Scenario 3: Patch Assessment</text>
  <text x="650" y="556" font-size="9" fill="#605e5c">scheduled scan → assess compliance</text>
  <text x="650" y="570" font-size="9" fill="#605e5c">→ generate report → plan rollout</text>
  <rect x="650" y="578" width="48" height="12" rx="6" fill="#fed9cc"/>
  <text x="674" y="587" text-anchor="middle" font-size="7" font-weight="600" fill="#d83b01">~5 min</text>

  <!-- ════════ BOTTOM BAR: Setup Flow ════════ -->
  <rect x="50" y="618" width="860" height="36" rx="18" fill="#fff" filter="url(#s)"/>
  <rect x="50" y="618" width="860" height="3" rx="18" fill="#0078d4"/>

  <text x="100" y="641" font-size="10" font-weight="600" fill="#0078d4">Setup (~15 min)</text>
  <text x="210" y="641" font-size="10" fill="#605e5c">→</text>
  <text x="228" y="641" font-size="10" fill="#323130">Deploy ArcBox</text>
  <text x="318" y="641" font-size="10" fill="#605e5c">→</text>
  <text x="336" y="641" font-size="10" fill="#323130">azd up</text>
  <text x="382" y="641" font-size="10" fill="#605e5c">→</text>
  <text x="400" y="641" font-size="10" fill="#323130">post-deploy.sh</text>
  <text x="506" y="641" font-size="10" fill="#605e5c">→</text>
  <text x="524" y="641" font-size="10" font-weight="600" fill="#d83b01">Break &amp; Investigate (~10 min)</text>

  <!-- ════════ LEGEND ════════ -->
  <text x="50" y="680" font-size="8" fill="#a19f9d">■</text>
  <rect x="50" y="672" width="10" height="10" rx="2" fill="#5c2d91"/>
  <text x="64" y="680" font-size="8" fill="#605e5c">On-Prem Servers</text>
  <rect x="150" y="672" width="10" height="10" rx="2" fill="#008272"/>
  <text x="164" y="680" font-size="8" fill="#605e5c">Monitor</text>
  <rect x="210" y="672" width="10" height="10" rx="2" fill="#0078d4"/>
  <text x="224" y="680" font-size="8" fill="#605e5c">SRE Agent</text>
  <rect x="290" y="672" width="10" height="10" rx="2" fill="#d83b01"/>
  <text x="304" y="680" font-size="8" fill="#605e5c">Update Manager</text>
  <rect x="400" y="672" width="10" height="10" rx="2" fill="#107c10"/>
  <text x="414" y="680" font-size="8" fill="#605e5c">Subagents</text>

  <text x="910" y="680" text-anchor="end" font-size="7" fill="#c8c6c4">SRE Agent — On-Premise VM Management Lab</text>
</svg>
